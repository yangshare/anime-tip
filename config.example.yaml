# anime-tip 配置文件示例
# 复制为 config.yaml 后按需修改
# 配置优先级：默认值 < 配置文件 < 环境变量（环境变量优先级最高）

# HTTP 服务端口
# 环境变量：PORT
port: "8080"

# 定时检查 Cron 表达式（默认每小时整点检查一次）
# 环境变量：CHECK_CRON（推荐）；CHECK_INTERVAL 为兼容别名，二者等价
# 示例：
#   "*/30 * * * *"  每 30 分钟
#   "0 9,21 * * *"  每天 9:00 和 21:00
check_cron: "0 * * * *"

# Server 酱 SendKey（用于推送微信通知）
# 环境变量：SERVER_CHAN_KEY
# 获取方式：https://sct.ftqq.com 登录后获取
server_chan_key: ""

# 动漫数据源 API 地址（苹果 CMS provide/vod 采集协议，一般不需要修改）
# 环境变量：VOD_BASE_URL（旧版 KEKE9_BASE_URL 作为兼容别名仍可用）
# 该源失效时可替换为任意支持 provide/vod 协议的采集站根地址。
vod_base_url: "https://cj.lziapi.com"

# 详情页地址模板（用于通知中的可点击链接，通常留空使用默认）
# 占位符：{base}=数据源根地址，{id}=vod_id
# 环境变量：VOD_DETAIL_URL
# vod_detail_url: "{base}/index.php/vod/detail/id/{id}.html"

# SQLite 数据库文件路径
# 环境变量：DB_PATH
# Docker 部署时建议设为 /data/anime-tip.db
db_path: "anime-tip.db"
